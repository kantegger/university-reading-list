<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F8FAFC"/>
  
  <!-- Header background -->
  <rect width="1200" height="120" fill="#3B82F6"/>
  
  <!-- Title -->
  <text x="600" y="80" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="white" text-anchor="middle">
    University Reading List
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="200" font-family="system-ui, sans-serif" font-size="32" font-weight="500" fill="#1E293B" text-anchor="middle">
    大学生必读书单推荐平台
  </text>
  
  <!-- Description -->
  <text x="600" y="270" font-family="system-ui, sans-serif" font-size="24" fill="#64748B" text-anchor="middle">
    Curated reading lists for university students
  </text>
  
  <!-- Book icon -->
  <g transform="translate(570, 320)">
    <rect x="0" y="0" width="60" height="80" fill="#3B82F6" rx="4"/>
    <rect x="4" y="4" width="52" height="72" fill="#60A5FA" rx="2"/>
    <line x1="12" y1="20" x2="48" y2="20" stroke="white" stroke-width="2"/>
    <line x1="12" y1="30" x2="48" y2="30" stroke="white" stroke-width="2"/>
    <line x1="12" y1="40" x2="48" y2="40" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Website URL -->
  <text x="600" y="480" font-family="system-ui, sans-serif" font-size="20" fill="#64748B" text-anchor="middle">
    unireadinglist.com
  </text>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="450" r="40" fill="#E0E7FF" opacity="0.6"/>
  <circle cx="1050" cy="180" r="30" fill="#DBEAFE" opacity="0.7"/>
  <circle cx="1100" cy="500" r="25" fill="#F0F9FF" opacity="0.8"/>
</svg>